plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'java'
}

group = 'gg.modl'
version = property('version')

repositories {
    maven { url "https://nexus.modl.gg/repository/maven-releases/" }
    maven { url "https://nexus.modl.gg/repository/maven-snapshots/" }
    mavenCentral()
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://repo.codemc.io/repository/maven-releases/" }
    maven { url "https://repo.codemc.io/repository/maven-snapshots/" }
    maven { url "https://jitpack.io" }
    maven { url "https://repo.aikar.co/content/groups/aikar/" }
    maven { url "https://repo.alessiodp.com/snapshots/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.4"
    mappings "net.fabricmc:yarn:1.21.4+build.8:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.10"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.114.0+1.21.4"

    // Internal modules (pre-built from main project)
    implementation files("../../bridge-core/build/libs/bridge-core-${version}.jar")
    implementation files("../../core/build/libs/core-${version}.jar")
    implementation files("../../api/build/libs/api-${version}.jar")

    // Libby runtime library loading
    implementation "com.alessiodp.libby:libby-core:${property('libby_version')}"
    implementation "com.alessiodp.libby:libby-fabric:${property('libby_version')}"

    // Compile-only deps (loaded at runtime via Libby)
    compileOnly "gg.modl.minecraft.cirrus:cirrus-fabric:4.2.4"
    compileOnly "gg.modl.minecraft.cirrus:cirrus-api:4.2.4"
    compileOnly "gg.modl.minecraft.cirrus:cirrus-common:4.2.4"
    compileOnly "gg.modl.minecraft.packetevents:packetevents-api:${findProperty('packetevents.version') ?: '2.12.3'}"
    compileOnly "gg.modl.minecraft.replay:modl-replay-recording:1.1.2"
    compileOnly "gg.modl.minecraft.replay:replay-format:1.1.0"

    // Provided by server
    compileOnly "io.github.revxrsal:lamp.common:${property('lamp_version')}"
    compileOnly "io.github.revxrsal:lamp.brigadier:${property('lamp_version')}"
    compileOnly "io.github.revxrsal:lamp.fabric:${property('lamp_version')}"
    compileOnly "io.netty:netty-all:4.1.97.Final"
    compileOnly "net.kyori:adventure-text-minimessage:4.26.1"
    compileOnly "net.kyori:adventure-text-serializer-legacy:4.26.1"
    compileOnly "net.kyori:adventure-api:4.26.1"
    compileOnly "org.yaml:snakeyaml:2.3"

    // Lombok
    compileOnly "org.projectlombok:lombok:1.18.34"
    annotationProcessor "org.projectlombok:lombok:1.18.34"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

loom {
    accessWidenerPath = file("src/main/resources/modl.accesswidener")
    mods {
        create("modl") {
            sourceSet sourceSets.main
        }
    }
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

jar {
    from("../../LICENSE.txt") {
        rename { "LICENSE_modl.txt" }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
}
