plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'java'
}

// version and group inherited from root gradle.properties

repositories {
    mavenLocal()
    mavenCentral()
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://repo.codemc.io/repository/maven-releases/" }
    maven { url "https://repo.codemc.io/repository/maven-snapshots/" }
    maven { url "https://jitpack.io" }
    maven { url "https://repo.aikar.co/content/groups/aikar/" }
    maven { url "https://repo.alessiodp.com/snapshots/" }
}

dependencies {
    // Fabric
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Internal modules
    implementation project(":bridge-core")
    implementation project(":core")
    implementation project(":api")

    // Libby runtime library loading
    implementation "com.alessiodp.libby:libby-core:${rootProject.property('libby.version')}"
    implementation "com.alessiodp.libby:libby-fabric:${rootProject.property('libby.version')}"

    // Compile-only deps (loaded at runtime via Libby)
    compileOnly "gg.modl.minecraft.cirrus:cirrus-fabric:4.2.0-SNAPSHOT"
    compileOnly "gg.modl.minecraft.cirrus:cirrus-api:4.2.0-SNAPSHOT"
    compileOnly "gg.modl.minecraft.cirrus:cirrus-common:4.2.0-SNAPSHOT"
    compileOnly "com.github.retrooper:packetevents-api:2.12.0-SNAPSHOT"
    compileOnly "gg.modl.replay:modl-replay-recording:1.0.0-SNAPSHOT"
    compileOnly "gg.modl.replay:replay-format:1.0.0-SNAPSHOT"

    // Provided by server
    compileOnly "io.netty:netty-all:4.1.97.Final"
    compileOnly "net.kyori:adventure-text-minimessage:4.26.1"
    compileOnly "net.kyori:adventure-text-serializer-legacy:4.26.1"
    compileOnly "net.kyori:adventure-api:4.26.1"
    compileOnly "org.yaml:snakeyaml:2.3"

    // Lombok
    compileOnly "org.projectlombok:lombok:1.18.34"
    annotationProcessor "org.projectlombok:lombok:1.18.34"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

loom {
    mods {
        create("modl") {
            sourceSet sourceSets.main
        }
    }
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

jar {
    from("../../LICENSE.txt") {
        rename { "LICENSE_modl.txt" }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
}
