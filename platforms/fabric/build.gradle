plugins {
    id 'fabric-loom'
    id 'java'
}


// Load local gradle.properties as defaults (Gradle only auto-loads root gradle.properties)
def localProps = new Properties()
file("gradle.properties").withInputStream { localProps.load(it) }
localProps.each { key, value -> project.ext.set(key.toString(), value) }

// Override with version-specific properties if -Pmc_version is passed
def mcVersion = project.hasProperty('mc_version') ? project.property('mc_version') : project.ext.minecraft_version
def versionFile = file("versions/${mcVersion}.properties")
if (versionFile.exists()) {
    def versionProps = new Properties()
    versionFile.withInputStream { versionProps.load(it) }
    versionProps.each { key, value -> project.ext.set(key.toString(), value) }
}

// Capture into local variables for use inside closures
def mcVer = project.ext.minecraft_version
def yarnMappings = project.ext.yarn_mappings
def loaderVer = project.ext.loader_version
def fabricVer = project.ext.fabric_version

repositories {
    maven { url "https://nexus.modl.gg/repository/maven-releases/" }
    maven { url "https://nexus.modl.gg/repository/maven-snapshots/" }
    mavenCentral()
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://repo.codemc.io/repository/maven-releases/" }
    maven { url "https://repo.codemc.io/repository/maven-snapshots/" }
    maven { url "https://jitpack.io" }
    maven { url "https://repo.aikar.co/content/groups/aikar/" }
    maven { url "https://repo.alessiodp.com/snapshots/" }
}

dependencies {
    // Fabric
    minecraft "com.mojang:minecraft:${mcVer}"
    mappings "net.fabricmc:yarn:${yarnMappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${loaderVer}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabricVer}"

    // Internal modules
    implementation project(":bridge-core")
    implementation project(":core")
    implementation project(":api")

    // Libby runtime library loading
    implementation "com.alessiodp.libby:libby-core:${rootProject.property('libby.version')}"
    implementation "com.alessiodp.libby:libby-fabric:${rootProject.property('libby.version')}"

    // Compile-only deps (loaded at runtime via Libby)
    compileOnly "gg.modl.minecraft.cirrus:cirrus-fabric:${rootProject.property('cirrus.version')}"
    compileOnly "gg.modl.minecraft.cirrus:cirrus-api:${rootProject.property('cirrus.version')}"
    compileOnly "gg.modl.minecraft.cirrus:cirrus-common:${rootProject.property('cirrus.version')}"
    compileOnly "gg.modl.minecraft.packetevents:packetevents-api:${rootProject.property('packetevents.version')}"
    compileOnly "gg.modl.minecraft.replay:modl-replay-recording:${rootProject.property('replay.recording.version')}"
    compileOnly "gg.modl.minecraft.replay:replay-format:${rootProject.property('replay.format.version')}"

    // Provided by server
    compileOnly "io.github.revxrsal:lamp.common:${rootProject.property('lamp.version')}"
    compileOnly "io.github.revxrsal:lamp.brigadier:${rootProject.property('lamp.version')}"
    compileOnly "io.github.revxrsal:lamp.fabric:${rootProject.property('lamp.version')}"
    compileOnly "io.netty:netty-all:${rootProject.property('netty.version')}"
    compileOnly "net.kyori:adventure-text-minimessage:${rootProject.property('adventure.version')}"
    compileOnly "net.kyori:adventure-text-serializer-legacy:${rootProject.property('adventure.version')}"
    compileOnly "net.kyori:adventure-api:${rootProject.property('adventure.version')}"
    compileOnly "org.yaml:snakeyaml:${rootProject.property('snakeyaml.version')}"

    // Lombok
    compileOnly "org.projectlombok:lombok:${rootProject.property('lombok.version')}"
    annotationProcessor "org.projectlombok:lombok:${rootProject.property('lombok.version')}"

    testImplementation platform("org.junit:junit-bom:${rootProject.property('junit.bom.version')}")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

loom {
    accessWidenerPath = file("src/main/resources/modl.accesswidener")
    mods {
        create("modl") {
            sourceSet sourceSets.main
        }
    }
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

jar {
    from("../../LICENSE.txt") {
        rename { "LICENSE_modl.txt" }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}
