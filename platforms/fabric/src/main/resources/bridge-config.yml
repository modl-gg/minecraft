# Bridge configuration for modl.gg Spigot plugin.

# Proxy host (IP or hostname of the proxy server)
# Set this to the proxy's address. Leave empty in standalone mode.
proxy-host: "127.0.0.1"
# Proxy bridge port
proxy-port: 25590

# Commands executed on stat wipe ({player} is replaced with the player name)
stat-wipe-commands:
  - "clearstats {player}"

# Display name for the anticheat in reports
anticheat-name: "Anti-cheat"

# Server name used in bridge communication
server-name: "Server 1"

# Cooldown in seconds between auto-reports per player
report-cooldown: 60

# Violation threshold before auto-reporting (per check name, or "default")
report-violation-threshold:
  default: 10

# Replay recording settings
# Enable replay recording
replay-enabled: true
# Automatically start recording all players on join
replay-auto-record: true
# Buffer duration in seconds (how much history to keep)
replay-buffer-duration: 60
# Maximum recording duration in seconds
replay-max-duration: 300
# Block snapshot radius in blocks
replay-radius: 64
# Minimum interval between movement packets in milliseconds
replay-move-throttle: 50
# Save replay files to local disk after capture (default: false, files are deleted after upload)
replay-save-local: false
# How long to keep local replay files in minutes before auto-deleting (only used if replay-save-local is true)
# Default 7 days
replay-local-ttl: 10080
