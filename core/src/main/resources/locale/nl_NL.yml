      - "&7{will_expire}"
      - "&7Is dit een fout? Dien een beroep in op {appeal_url} met ID #{id}."

  ordinal_16: # Accountmisbruik
    public_notification: "&c{target} is verbannen wegens accountmisbruik."
    player_notification:
      - "&c&lJe {tense} {temp} verbannen voor:"
      - ""
