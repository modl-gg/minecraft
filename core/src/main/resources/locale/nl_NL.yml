      - "&7{will_expire}"
      - "&7Is dit een fout? Dien een beroep in op {appeal_url} met ID #{id}."

  ordinal_14: # Valsspelen
    public_notification: "&c{target} is verbannen wegens valsspelen."
    player_notification:
      - "&c&lJe {tense} {temp} verbannen voor:"
      - ""
      - "&f{player_description}"
      - "&7{will_expire}"
      - "&7Is dit een fout? Dien een beroep in op {appeal_url} met ID #{id}."

  ordinal_15: # Spelhandel
    public_notification: "&c{target} is verbannen wegens spelhandel."
    player_notification:
      - "&c&lJe {tense} {temp} verbannen voor:"
      - ""
