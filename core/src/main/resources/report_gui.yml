# Report GUI Configuration
# Configures the report menu layout (slots 19-25, 28-34 in a 6-row inventory)
# Slot numbers 1-14 map to these positions:
#   Row 3: [19, 20, 21, 22, 23, 24, 25] = slots 1-7
#   Row 4: [28, 29, 30, 31, 32, 33, 34] = slots 8-14
#
# Per-slot options:
#   chat-report: true/false - show chat log attachment option
#   replay-capture: true/false - show replay capture option (requires replay recording)

# Slot 1 - Disabled
1:
  enabled: false

# Slot 2 - Chat Abuse
2:
  enabled: true
  item: "minecraft:feather"
  title: "Chat Abuse"
  chat-report: true
  description:
    - "&7Low-quality chat, spam, or inappropriate language"
    - ""
    - "&eClick to report"

# Slot 3 - Anti-social
3:
